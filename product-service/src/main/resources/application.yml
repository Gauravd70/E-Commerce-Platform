server:
  port: 8080
  servlet:
    context-path: /products
spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
management:
  endpoints:
    health:
      show-details: always
      probes:
        enabled: true
    web:
      exposure:
        include: health
jwt:
  secret: ${JWT_SECRET}
  expiry:
    access: 3600000
    refresh: 604800000