apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: catalog-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: myecommerce.test
      http:
        paths:
          - path: /catalog
            pathType: Prefix
            backend:
              service:
                name: catalog
                port:
                  number: 80
