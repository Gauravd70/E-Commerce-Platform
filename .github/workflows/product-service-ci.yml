name: Product Service CI
run-name: New changes found in repository ${{ github.repository }}
on:
  push:
    branches:
      - main
    paths:
      - 'product-service/k8s/**'
      - 'product-service/src/**'
      - 'product-service/Dockerfile'
      - 'product-service/pom.xml'
concurrency:
  group: product-service-ci
  cancel-in-progress: true
env:
  IMAGE_NAME: gauravd70/ecommerce-product
  IMAGE_TAG: ${{ github.sha }}
jobs:
  ci:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: product-service
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
      
      - name: Generate settings.xml
        uses: Gauravd70/CI-Actions/maven-settings@v11
        with:
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}
      
      - name: Build
        run: mvn clean package
      
      - name: Docker Image Build
        uses: Gauravd70/CI-Actions/docker-build@v11
        with:
          image: ${{ env.IMAGE_NAME }}
          tag: ${{ env.IMAGE_TAG }}
          context: product-service
      
      - name: DockerHub Login
        uses: Gauravd70/CI-Actions/docker-login@v11
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
        
      - name: DockerHub Push
        uses: Gauravd70/CI-Actions/docker-push@v11
        with:
          image: ${{ env.IMAGE_NAME }}
          tag: ${{ env.IMAGE_TAG }}
      
      - name: DockerHub Push
        uses: Gauravd70/CI-Actions/docker-push@v11
        with:
          image: ${{ env.IMAGE_NAME }}
          tag: 'latest'
        