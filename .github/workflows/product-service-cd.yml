name: Product Service CD
run-name: New docker image found for ${{ github.repository }}
on:
  workflow_run:
    workflows: ["Product Service CI"]
    types:
      - completed
concurrency:
  group: product-service-cd
  cancel-in-progress: true
env:
  NAMESPACE: 'ecommerce'
  DEPLOYMENT: 'product-deployment'
  IMAGE_NAME: gauravd70/ecommerce-product
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
jobs:
  cd:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: product-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: k8s deploy
        uses: Gauravd70/CI-Actions/k8s-apply@v11
        with:
          ns: ${{ env.NAMESPACE }}
          k: product-service/k8s
    
      - name: k8s set image
        uses: Gauravd70/CI-Actions/k8s-set-image@v11
        with:
          ns: ${{ env.NAMESPACE }}
          deployment: ${{ env.DEPLOYMENT }}
          container: product
          image: ${{ env.IMAGE_NAME }}
          tag: ${{ env.IMAGE_TAG }}
      
      - name: k8s rollout status
        uses: Gauravd70/CI-Actions/k8s-rollout-status@v5
        with:
          ns: ${{ env.NAMESPACE }}
          deployment: ${{ env.DEPLOYMENT }}