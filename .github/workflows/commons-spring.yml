name: Commons Spring CI/CD
run-name: New changes found in repository ${{ github.repository }}
on:
  push:
    branches:
      - main
    paths:
      - 'commons-spring/src/**'
      - 'commons-spring/pom.xml'
jobs:
  ci_cd:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: commons-spring
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup JDK 21 
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup maven
        uses: Gauravd70/CI-Actions/maven-setup@v10
        with:
          cacert: ${{ secrets.MKCERT_CA }}

      - name: Generate settings.xml
        uses: Gauravd70/CI-Actions/maven-settings@v1
        with:
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Build and Deploy
        run: mvn clean deploy
