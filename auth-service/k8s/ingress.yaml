apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: myecommerce.com
    http:
      paths:
      - path: /auth
        path_type: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 80